services:
  mirofish:
    image: ghcr.io/666ghj/mirofish:latest
    # 加速镜像（如拉取缓慢可替换上方地址）
    # image: ghcr.nju.edu.cn/666ghj/mirofish:latest
    container_name: mirofish
    env_file:
      - .env
    ports:
      - "3000:3000"
      - "5001:5001"
    restart: unless-stopped
    volumes:
      - ./backend/uploads:/app/backend/uploads

  # Postgres + pgvector for the Zep -> Postgres migration (additive, opt-in).
  # Used only when GRAPH_BACKEND=postgres. Default flow (GRAPH_BACKEND=zep)
  # ignores this service entirely. Bring it up with:
  #   docker compose --profile postgres up -d db
  db:
    image: pgvector/pgvector:pg16
    container_name: mirofish-db
    profiles: ["postgres"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mirofish}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mirofish}
      POSTGRES_DB: ${POSTGRES_DB:-mirofish}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - mirofish_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mirofish} -d ${POSTGRES_DB:-mirofish}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  mirofish_pgdata: